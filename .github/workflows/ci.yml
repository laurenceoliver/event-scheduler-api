name: Event Scheduler CI

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - name: Run tests
        run: ./mvnw test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy to GCP VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          script: |
            # Clone if not exists, otherwise pull
            if [ ! -d "/home/laurenceoliverhernandez/event-scheduler-api" ]; then
              git clone git@github.com:laurenceoliver/event-scheduler-api.git /home/laurenceoliverhernandez/event-scheduler-api
            fi
            cd /home/laurenceoliverhernandez/event-scheduler-api
            git pull origin master
            docker stop event-scheduler-api 2>/dev/null || true
            docker rm event-scheduler-api 2>/dev/null || true
            docker build -t event-scheduler-api:latest .
            docker compose up -d
